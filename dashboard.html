<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loyal RolePlay</title>
<link rel="icon" href="logo.png">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

:root{
    --text:#ffffff;
    --muted:#a1a1aa;
    --purple:#8b5cf6;
    --purple2:#a855f7;
    --glass:rgba(16,16,24,.58);
    --border:rgba(255,255,255,.06);
    --shadow:0 20px 45px rgba(0,0,0,.30);
}

body{
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(rgba(7,7,12,.38),rgba(7,7,12,.68)),
    url("background.png") center/cover fixed;
    color:var(--text);
}

/* loading */
#loadingScreen{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:#0e1324;
    z-index:99999;
    font-size:24px;
    font-weight:700;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:20px;left:20px;bottom:20px;
    width:285px;
    padding:28px 20px;
    border-radius:34px;
    background:rgba(10,10,18,.68);
    backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,.05);
    overflow-y:auto;
}

.sidebar::-webkit-scrollbar{display:none;}

.logo{
    font-size:26px;
    margin-bottom:25px;
}

nav{
    display:flex;
    flex-direction:column;
    gap:8px;
}

nav a{
    display:flex;
    gap:14px;
    padding:14px 16px;
    border-radius:16px;
    color:#aaa;
    text-decoration:none;
    transition:.2s;
}

nav a:hover{background:rgba(255,255,255,.05);color:#fff;}
nav a.active{
    background:linear-gradient(135deg,rgba(139,92,246,.22),rgba(168,85,247,.10));
    color:#fff;
}

/* MAIN */
.main{
    margin-left:325px;
    padding:30px;
}

/* HERO */
.hero{
    display:flex;
    gap:20px;
    align-items:center;
    padding:25px;
    border-radius:30px;
    margin-bottom:20px;
    background:rgba(255,255,255,.03);
}

.hero img{
    width:90px;height:90px;
    border-radius:22px;
    object-fit:cover;
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(2,300px);
    gap:20px;
    margin-bottom:20px;
}

.card{
    padding:20px;
    border-radius:25px;
    background:rgba(255,255,255,.03);
    display:flex;
    gap:15px;
    align-items:center;
}

.card i{
    font-size:26px;
    color:var(--purple2);
}

/* DASHBOARD */
.dashboard-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.panel{
    padding:20px;
    border-radius:25px;
    background:rgba(255,255,255,.03);
}

.panel h3{margin-bottom:12px;color:#d6b3ff;}

.activity-item{
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    background:rgba(255,255,255,.03);
}

/* NOTIF */
#bellBtn{
    position:fixed;
    top:25px;
    left:330px;
    font-size:22px;
    cursor:pointer;
}

#notifBox{
    position:fixed;
    top:60px;
    left:330px;
    width:260px;
    background:#111;
    padding:10px;
    border-radius:12px;
    display:none;
}

/* PROFILE */
.profile{
    position:fixed;
    top:20px;
    right:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img{
    width:50px;height:50px;
    border-radius:50%;
}

.profile-card{
    position:fixed;
    top:80px;
    right:20px;
    width:250px;
    padding:15px;
    background:#111;
    border-radius:12px;
    display:none;
}
</style>
</head>

<body>

<div id="loadingScreen">Loading...</div>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">Loyal RP</div>

<nav>
<a class="active" href="#"><i class="fa-solid fa-house"></i> Dashboard</a>
<a href="#"><i class="fa-solid fa-users"></i> Membri</a>
<a href="#"><i class="fa-solid fa-shirt"></i> Uniformă</a>
<a href="#"><i class="fa-solid fa-location-dot"></i> Locații</a>
<a href="#"><i class="fa-solid fa-circle-info"></i> Info-Craft</a>
<a href="#"><i class="fa-solid fa-hammer"></i> Craft Arme</a>
<a href="#"><i class="fa-solid fa-list-check"></i> Task-uri</a>
<a href="#"><i class="fa-solid fa-truck"></i> Livrări</a>
<a href="#"><i class="fa-solid fa-money-bill"></i> Fonduri</a>
<a href="#"><i class="fa-solid fa-phone"></i> Nr Tel</a>
<a href="#"><i class="fa-solid fa-hand-holding-dollar"></i> Donații</a>
</nav>
</div>

<!-- MAIN -->
<div class="main">

<div class="hero">
<img id="profileAvatar" src="https://ui-avatars.com/api/?name=User">
<div>
<h2>Loyal RolePlay</h2>
<small>Welcome back!</small>
</div>
</div>

<div class="stats">
<div class="card">
<i class="fa-solid fa-users"></i>
<div><small>Players</small><h2>128</h2></div>
</div>

<div class="card">
<i class="fa-solid fa-car"></i>
<div><small>Vehicles</small><h2 id="vehicleNumber">1524</h2></div>
</div>
</div>

<div class="dashboard-grid">
<div class="panel">
<h3>Staff Online</h3>
<div>Admin Alex</div>
<div>Helper Mike</div>
</div>

<div class="panel">
<h3>Activity</h3>
<div class="activity-item">Server restarted</div>
<div class="activity-item">Event started</div>
</div>
</div>

</div>

<!-- NOTIF -->
<div id="bellBtn">🔔</div>
<div id="notifBox"></div>

<!-- PROFILE -->
<div class="profile">
<img id="profileAvatarSmall" src="">
<span id="profileName"></span>
</div>

<div class="profile-card" id="profileCard">
<input id="cardDiscord">
<button id="logoutBtn">Logout</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase,ref,get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyD...",
authDomain:"PHXp-7ad68.firebaseapp.com",
databaseURL:"https://PHXp-7ad68-default-rtdb.firebaseio.com",
projectId:"PHXp-7ad68",
appId:"1:9584..."
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();
const db=getDatabase();

const loading=document.getElementById("loadingScreen");

/* SAFE LOAD */
setTimeout(()=>loading.style.display="none",2000);

/* PROFILE FIX */
async function loadProfile(uid){
const snap=await get(ref(db,"users/"+uid));
if(!snap.exists())return;

const d=snap.val();

document.getElementById("profileAvatar").src=
d.avatar || "https://ui-avatars.com/api/?name="+d.discord;

document.getElementById("profileAvatarSmall").src=
d.avatar || "https://ui-avatars.com/api/?name="+d.discord;

document.getElementById("profileName").innerText=d.discord;
}

/* AUTH */
onAuthStateChanged(auth,(user)=>{
loading.style.display="none";

if(user){
loadProfile(user.uid);
}else{
console.log("no user");
}
});

/* NOTIF FIX */
const bell=document.getElementById("bellBtn");
const box=document.getElementById("notifBox");

bell.onclick=()=>{
box.style.display=box.style.display==="block"?"none":"block";
box.innerHTML="Server update<br>Event started";
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick=()=>signOut(auth);
</script>

</body>
</html>
