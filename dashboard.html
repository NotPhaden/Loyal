<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyal RolePlay</title>
<link rel="icon" href="logo.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#1c2238,#0e1324);
  color:white;
}

.hidden{display:none !important;}

#loadingScreen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#0e1324;
  z-index:99999;
  font-size:22px;
  font-weight:bold;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;top:0;bottom:0;
  width:220px;
  background:#1f2a41;
  padding:20px;
}

.nav-item{
  display:block;
  padding:12px;
  color:#cbd5e1;
  text-decoration:none;
  border-radius:8px;
}

.nav-item:hover{
  background:rgba(255,255,255,0.06);
  color:white;
}

/* MAIN */
.content{
  margin-left:240px;
  padding:30px;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  gap:20px;
  padding:20px;
  background:rgba(255,255,255,0.04);
  border-radius:16px;
}

.hero img{
  width:80px;
  height:80px;
  border-radius:18px;
  object-fit:cover;
}

/* PROFILE TOP */
.profile{
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:50px;height:50px;
  border-radius:50%;
}
</style>
</head>

<body>

<div id="loadingScreen">Loading...</div>

<!-- SIDEBAR TA -->
<div class="sidebar hidden" id="sidebar">
<a class="nav-item active" href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
<a class="nav-item" href="membri.html"><i class="fa-solid fa-users"></i> Membri</a>
<a class="nav-item" href="uniforma.html"><i class="fa-solid fa-shirt"></i> Uniformă</a>
<a class="nav-item" href="locatii.html"><i class="fa-solid fa-location-dot"></i> Locații</a>
<a class="nav-item" href="infocraft.html"><i class="fa-solid fa-circle-info"></i> Info-Craft</a>
<a class="nav-item" href="craftarme.html"><i class="fa-solid fa-hammer"></i> Craft Arme</a>
<a class="nav-item" href="taskuri.html"><i class="fa-solid fa-list-check"></i> Task-uri</a>
<a class="nav-item" href="livrari.html"><i class="fa-solid fa-truck"></i> Livrări</a>
<a class="nav-item" href="fonduri.html"><i class="fa-solid fa-money-bill-wave"></i> Fonduri</a>
<a class="nav-item" href="telefon.html"><i class="fa-solid fa-phone"></i> Nr Tel</a>
<a class="nav-item" href="taxa.html"><i class="fa-solid fa-money-bill"></i> Taxă</a>
<a class="nav-item" href="donatii.html"><i class="fa-solid fa-hand-holding-dollar"></i> Donații</a>
</div>

<!-- CONTENT -->
<div class="content hidden" id="mainContent">

<div class="hero">
<img id="profileAvatar" src="https://ui-avatars.com/api/?name=User">
<div>
<h2 id="welcomeText">Welcome back</h2>
<small>Loyal RolePlay Dashboard</small>
</div>
</div>

</div>

<!-- PROFILE TOP -->
<div class="profile hidden" id="profileBtn">
<img id="profileAvatarTop">
<span id="profileName"></span>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD...",
authDomain: "PHXp-7ad68.firebaseapp.com",
databaseURL: "https://PHXp-7ad68-default-rtdb.firebaseio.com",
projectId: "PHXp-7ad68",
appId: "1:9584..."
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

const loading = document.getElementById("loadingScreen");

function showUI(){
  document.getElementById("sidebar").classList.remove("hidden");
  document.getElementById("mainContent").classList.remove("hidden");
  document.getElementById("profileBtn").classList.remove("hidden");
}

async function loadUser(uid){
  const snap = await get(ref(db,"users/"+uid));
  if(!snap.exists()) return;

  const data = snap.val();

  const avatar = data.avatar || "https://ui-avatars.com/api/?name="+data.discord;

  document.getElementById("profileAvatar").src = avatar;
  document.getElementById("profileAvatarTop").src = avatar;
  document.getElementById("profileName").innerText = data.discord || "User";

  document.getElementById("welcomeText").innerText =
    "Welcome back, " + (data.discord || "User");
}

onAuthStateChanged(auth, async (user)=>{
  loading.style.display="none";

  if(user){
    showUI();
    await loadUser(user.uid);
  } else {
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
