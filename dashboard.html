<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loyal RolePlay - Dashboard</title>

<link rel="icon" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:radial-gradient(circle,#1c2238,#0e1324);
color:white;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;top:0;
width:260px;height:100%;
background:#1f2a41;
padding:20px;
}

.sidebar a{
display:flex;
gap:10px;
padding:12px;
color:#c4c9d6;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.05);
}

/* MAIN */
.main{
margin-left:280px;
padding:30px;
display:none;
}

/* HERO */
.hero{
display:flex;
gap:15px;
align-items:center;
padding:20px;
background:rgba(255,255,255,0.03);
border-radius:15px;
}

.hero img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid #1a74ff;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Loyal RP</h2>

<a href="dashboard.html"><i class="fa fa-house"></i> Dashboard</a>
<a href="membri.html"><i class="fa fa-users"></i> Membri</a>
<a href="uniforma.html"><i class="fa fa-shirt"></i> Uniformă</a>
<a href="locatii.html"><i class="fa fa-location-dot"></i> Locații</a>
<a href="infocraft.html"><i class="fa fa-info"></i> Info-Craft</a>
<a href="craftarme.html"><i class="fa fa-hammer"></i> Craft Arme</a>
<a href="taskuri.html"><i class="fa fa-list"></i> Task-uri</a>
<a href="livrari.html"><i class="fa fa-truck"></i> Livrări</a>
<a href="fonduri.html"><i class="fa fa-money-bill"></i> Fonduri</a>
<a href="telefon.html"><i class="fa fa-phone"></i> Nr Tel</a>
<a href="taxa.html"><i class="fa fa-coins"></i> Taxă</a>
<a href="donatii.html"><i class="fa fa-hand-holding-dollar"></i> Donații</a>
</div>

<div class="main" id="main">

<div class="hero">
<img id="avatar" src="https://ui-avatars.com/api/?name=User">
<div>
<h2 id="welcome">Loading...</h2>
<small id="username">...</small>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyD...",
authDomain:"PHXp-7ad68.firebaseapp.com",
databaseURL:"https://PHXp-7ad68-default-rtdb.firebaseio.com",
projectId:"PHXp-7ad68",
appId:"1:9584..."
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

const main = document.getElementById("main");

/* LOAD PROFILE */
async function loadProfile(uid){
const snap = await get(ref(db,"users/"+uid));

if(!snap.exists()) return;

const d = snap.val();

const avatar =
d.avatar ||
"https://ui-avatars.com/api/?name=" + encodeURIComponent(d.discord || "User");

document.getElementById("avatar").src = avatar;
document.getElementById("username").innerText = d.discord || "User";
document.getElementById("welcome").innerText = "Welcome back, " + (d.discord || "User");
}

/* AUTH FIX (NO REDIRECT BUG) */
onAuthStateChanged(auth, async (user) => {

if(user){
main.style.display = "block";
await loadProfile(user.uid);
} else {
window.location.href = "index.html";
}

});

</script>

</body>
</html>
