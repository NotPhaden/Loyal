
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --text:#ffffff;
}

html,body{
    height:100%;
    overflow:hidden;
}

body{
    background:
    linear-gradient(rgba(7,7,12,.38), rgba(7,7,12,.68)),
    url("background.png") center/cover no-repeat fixed;
    color:var(--text);
}

.sidebar{
    position:fixed;
    top:20px;
    left:20px;
    bottom:20px;
    width:285px;
    padding:28px 20px;
    border-radius:34px;
    background:rgba(10,10,18,.68);
    backdrop-filter:blur(22px);
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 18px;
    border-radius:18px;
    color:#9e9eab;
    text-decoration:none;
}

.sidebar a:hover{
    background:rgba(255,255,255,.04);
    color:white;
}

.topbar{
    margin-left:325px;
    height:80px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:0 30px;
}

.profile{
    display:flex;
    align-items:center;
    cursor:pointer;
    gap:10px;
}

.profile img{
    width:45px;
    height:45px;
    border-radius:14px;
}

.content{
    margin-left:325px;
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.card{
    padding:24px;
    border-radius:30px;
    background:rgba(255,255,255,.03);
}

.user-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    border-radius:14px;
    background:rgba(255,255,255,.03);
}

.user-item img{
    width:40px;
    height:40px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="sidebar">
<a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
<a href="membri.html"><i class="fa-solid fa-users"></i> Membri</a>
<a href="uniforma.html"><i class="fa-solid fa-shirt"></i> Uniformă</a>
<a href="locatii.html"><i class="fa-solid fa-location-dot"></i> Locații</a>
<a href="infocraft.html"><i class="fa-solid fa-circle-info"></i> Info-Craft</a>
<a href="craftarme.html"><i class="fa-solid fa-hammer"></i> Craft Arme</a>
<a href="taskuri.html" class="active"><i class="fa-solid fa-list-check"></i> Task-uri</a>
<a href="livrari.html"><i class="fa-solid fa-truck"></i> Livrări</a>
<a href="fonduri.html"><i class="fa-solid fa-money-bill-wave"></i> Fonduri</a>
<a href="telefon.html"><i class="fa-solid fa-phone"></i> Nr Tel</a>
<a href="taxa.html"><i class="fa-solid fa-money-bill"></i> Taxă</a>
</div>

<div class="topbar">
  <div class="profile">
    <img id="avatar" src="">
    <span id="name">User</span>
  </div>
</div>

<div class="content">
  <h2>Dashboard</h2>

  <div class="grid">

    <div class="card">
      <h3>📊 Conturi create</h3>
      <p id="totalUsers">Se încarcă...</p>
    </div>

    <div class="card" style="grid-column: span 2;">
      <h3>👤 Utilizatori</h3>
      <div id="usersList" style="display:grid;gap:10px;margin-top:10px;"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_QTU32QGx14PpaGIwT_N-PFnFjL8UO_E",
  authDomain: "la-nueva-2f499.firebaseapp.com",
  projectId: "la-nueva-2f499",
  storageBucket: "la-nueva-2f499.appspot.com",
  messagingSenderId: "999957175996",
  appId: "1:999957175996:web:84c834a90bd3ced93dbab9",
  measurementId: "G-6728MK75NJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

async function loadUsers(){
  const snap = await get(ref(db, "users"));

  const list = document.getElementById("usersList");
  const total = document.getElementById("totalUsers");

  if(!snap.exists()){
    total.textContent = "0";
    list.innerHTML = "<p>Nu există utilizatori.</p>";
    return;
  }

  const users = Object.values(snap.val());

  total.textContent = users.length;

  list.innerHTML = users.map(u => `
    <div class="user-item">
      <img src="${u.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}">
      <div>
        <b>${u.discord || "Fără nume"}</b>
      </div>
    </div>
  `).join("");
}

async function loadCurrent(uid){
  const snap = await get(ref(db, "users/" + uid));
  if(snap.exists()){
    const u = snap.val();
    document.getElementById("name").textContent = u.discord || "User";
    document.getElementById("avatar").src = u.avatar || "https://cdn.discordapp.com/embed/avatars/0.png";
  }
}

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  loadCurrent(user.uid);
  loadUsers();
});
</script>

</body>
