<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loyal RolePlay - Dashboard</title>

<link rel="icon" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:radial-gradient(circle,#1c2238,#0e1324);
color:white;
overflow:hidden;
}

.sidebar{
position:fixed;
left:0;top:0;
width:220px;height:100%;
background:#1f2a41;
padding:20px;
}

.sidebar a{
display:block;
padding:12px;
color:#c4c9d6;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{background:rgba(255,255,255,0.05);}

.main{
margin-left:240px;
padding:30px;
}

.hero{
display:flex;
align-items:center;
gap:15px;
padding:20px;
background:rgba(255,255,255,0.03);
border-radius:15px;
}

.hero img{
width:80px;height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid #1a74ff;
}

.stats{display:none;} /* SCOASE COMPLET */

</style>
</head>

<body>

<div class="sidebar">
<h2>Loyal RP</h2>

<a href="dashboard.html"><i class="fa fa-house"></i> Dashboard</a>
<a href="membri.html">Membri</a>
<a href="uniforma.html">Uniformă</a>
<a href="locatii.html">Locații</a>
</div>

<div class="main">

<div class="hero">
<img id="avatar" src="https://ui-avatars.com/api/?name=User">
<div>
<h2 id="welcome">Welcome back</h2>
<small id="username">User</small>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyD...",
authDomain:"PHXp-7ad68.firebaseapp.com",
databaseURL:"https://PHXp-7ad68-default-rtdb.firebaseio.com",
projectId:"PHXp-7ad68",
appId:"1:9584..."
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

async function load(uid){
const snap = await get(ref(db,"users/"+uid));

if(!snap.exists()) return;

const d = snap.val();

const avatar =
d.avatar ||
"https://ui-avatars.com/api/?name="+encodeURIComponent(d.discord || "User");

document.getElementById("avatar").src = avatar;
document.getElementById("username").innerText = d.discord || "User";
document.getElementById("welcome").innerText = "Welcome back " + (d.discord || "User");
}

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="index.html";
return;
}

load(user.uid);
});
</script>

</body>
</html>
