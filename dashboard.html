<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loyal RolePlay</title>

<link rel="icon" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

:root{
    --purple:#8b5cf6;
    --purple2:#a855f7;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(rgba(7,7,12,.38),rgba(7,7,12,.68)),url("background.png") center/cover fixed;
    color:white;
}

#loadingScreen{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:#0e1324;
    z-index:99999;
    font-size:22px;
    font-weight:700;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:20px;left:20px;bottom:20px;
    width:285px;
    padding:28px 20px;
    border-radius:30px;
    background:rgba(10,10,18,.7);
    backdrop-filter:blur(22px);
    overflow-y:auto;
}

nav{display:flex;flex-direction:column;gap:8px;}

nav a{
    padding:14px;
    border-radius:14px;
    color:#aaa;
    text-decoration:none;
    display:flex;
    gap:12px;
}

nav a:hover{background:rgba(255,255,255,.05);color:white;}

/* MAIN */
.main{
    margin-left:325px;
    padding:30px;
}

/* HERO */
.hero{
    display:flex;
    gap:20px;
    align-items:center;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,.03);
}

.hero img{
    width:90px;height:90px;
    border-radius:20px;
    object-fit:cover;
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(2,300px);
    gap:20px;
    margin-top:20px;
}

.card{
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.03);
    display:flex;
    gap:15px;
}

/* NOTIF */
#bellBtn{
    position:fixed;
    top:25px;
    left:330px;
    font-size:22px;
    cursor:pointer;
}

#notifBox{
    position:fixed;
    top:60px;
    left:330px;
    width:260px;
    background:#111;
    padding:10px;
    border-radius:12px;
    display:none;
}

/* PROFILE */
.profile{
    position:fixed;
    top:20px;
    right:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img{
    width:50px;height:50px;
    border-radius:50%;
    object-fit:cover;
}
</style>
</head>

<body>

<div id="loadingScreen">Loading...</div>

<!-- SIDEBAR -->
<div class="sidebar">
<nav>
<a href="#"><i class="fa-solid fa-house"></i> Dashboard</a>
<a href="#"><i class="fa-solid fa-users"></i> Membri</a>
<a href="#"><i class="fa-solid fa-shirt"></i> Uniformă</a>
<a href="#"><i class="fa-solid fa-location-dot"></i> Locații</a>
</nav>
</div>

<!-- MAIN -->
<div class="main">

<div class="hero">
<img id="profileAvatar" src="https://ui-avatars.com/api/?name=User">
<div>
<h2 id="profileName">Loyal RolePlay</h2>
<small>Welcome back</small>
</div>
</div>

<div class="stats">
<div class="card">
<i class="fa-solid fa-users"></i>
<div><small>Players</small><h2>128</h2></div>
</div>

<div class="card">
<i class="fa-solid fa-car"></i>
<div><small>Vehicles</small><h2>1524</h2></div>
</div>
</div>

</div>

<!-- NOTIF -->
<div id="bellBtn">🔔</div>
<div id="notifBox"></div>

<!-- PROFILE -->
<div class="profile">
<img id="profileAvatarSmall" src="">
<span id="profileNameSmall"></span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase,ref,get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyD...",
authDomain:"PHXp-7ad68.firebaseapp.com",
databaseURL:"https://PHXp-7ad68-default-rtdb.firebaseio.com",
projectId:"PHXp-7ad68",
appId:"1:9584..."
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();
const db=getDatabase();

const loading=document.getElementById("loadingScreen");

/* FIX LOADING SAFE */
setTimeout(()=>loading.style.display="none",1500);

/* PROFILE FIX */
async function loadProfile(uid){
const snap=await get(ref(db,"users/"+uid));
if(!snap.exists()) return;

const d=snap.val();

const avatar =
d.avatar ||
"https://ui-avatars.com/api/?name="+encodeURIComponent(d.discord || "User");

document.getElementById("profileAvatar").src=avatar;
document.getElementById("profileAvatarSmall").src=avatar;
document.getElementById("profileNameSmall").innerText=d.discord || "User";
document.getElementById("profileName").innerText=d.discord || "User";
}

/* AUTH */
onAuthStateChanged(auth,(user)=>{
loading.style.display="none";

if(user){
loadProfile(user.uid);
}
});

/* NOTIF FIX */
const bell=document.getElementById("bellBtn");
const box=document.getElementById("notifBox");

const notifications=[
"Server update v1.2.5",
"Event started",
"New rules added"
];

bell.onclick=()=>{
box.style.display = box.style.display==="block"?"none":"block";
box.innerHTML = notifications.map(n=>`<div>${n}</div>`).join("");
};
</script>

</body>
</html>
