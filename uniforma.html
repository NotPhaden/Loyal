<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    linear-gradient(rgba(7,7,12,.55), rgba(7,7,12,.85)),
    url("background.png") center/cover no-repeat fixed;
    color:white;
}

.app{ display:flex; }

.sidebar{
    width:270px;
    min-height:100vh;
    padding:25px;
    background:rgba(10,10,18,.75);
    backdrop-filter:blur(20px);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{ font-size:22px; }
.logo span{ font-size:12px; opacity:.7; }
.logo p{ font-size:10px; opacity:.5; }

.sidebar nav a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    color:#a1a1aa;
    text-decoration:none;
    transition:.2s;
}

.sidebar nav a:hover{
    background:rgba(255,255,255,.05);
    color:white;
}

.sidebar nav a.active{
    background:rgba(139,92,246,.25);
    color:white;
}

.main{
    flex:1;
    padding:25px;
}

.members-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:14px;
}

.member-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:12px;
    transition:.2s;
}

.member-card:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.06);
}

.member-avatar{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:14px;
}

.member-card h2{
    margin-top:10px;
    font-size:15px;
}

.member-rank{
    display:inline-block;
    margin-top:6px;
    padding:4px 8px;
    border-radius:8px;
    font-size:11px;
    background:rgba(139,92,246,.25);
}

.member-card p{
    margin-top:10px;
    font-size:12px;
    color:#cfcfd6;
    line-height:1.5;
}
</style>

</head>
