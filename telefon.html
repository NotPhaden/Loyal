
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informații - La Nueva Familia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(rgba(7,7,12,.55), rgba(7,7,12,.75)),
url("background.png") center/cover no-repeat fixed;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
position:fixed;
top:20px;
left:20px;
bottom:20px;
width:285px;
padding:28px 20px;
border-radius:34px;
background:rgba(10,10,18,.68);
backdrop-filter:blur(22px);
}

.sidebar a{
display:flex;
align-items:center;
gap:14px;
padding:14px 16px;
border-radius:14px;
color:#aaa;
text-decoration:none;
margin-bottom:6px;
}

.sidebar a:hover{background:rgba(255,255,255,.05);color:white;}

.main{
margin-left:325px;
padding:30px;
width:100%;
overflow:auto;
}

.box{
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
max-width:750px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.input{
width:100%;
height:50px;
border:none;
outline:none;
border-radius:14px;
padding:0 15px;
background:rgba(255,255,255,0.05);
color:white;
}

.btn{
width:100%;
margin-top:12px;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#8b5cf6,#a855f7);
color:white;
font-weight:600;
cursor:pointer;
}

.members-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
margin-top:25px;
}

.member-card{
padding:20px;
border-radius:18px;
background:rgba(255,255,255,0.05);
text-align:center;
}

.member-avatar{
width:70px;
height:70px;
border-radius:50%;
border:2px solid #8b5cf6;
object-fit:cover;
}

.view-btn{
margin-top:10px;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:600;
background:linear-gradient(135deg,#8b5cf6,#a855f7);
}

.popup-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
backdrop-filter:blur(8px);
}

.popup-box{
width:750px;
max-width:95%;
padding:30px;
border-radius:20px;
background:rgba(18,18,28,0.6);
backdrop-filter:blur(22px);
overflow-y:auto;
max-height:85vh;
text-align:center;
}

.card{
margin-top:10px;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.05);
text-align:left;
}

.close-btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
font-weight:600;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="sidebar">
<a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
<a href="membri.html"><i class="fa-solid fa-users"></i> Membri</a>
<a href="uniforma.html"><i class="fa-solid fa-shirt"></i> Uniformă</a>
<a href="locatii.html"><i class="fa-solid fa-location-dot"></i> Locații</a>
<a href="infocraft.html"><i class="fa-solid fa-circle-info"></i> Info-Craft</a>
<a href="craftarme.html"><i class="fa-solid fa-hammer"></i> Craft Arme</a>
<a href="taskuri.html"><i class="fa-solid fa-list-check"></i> Task-uri</a>
<a href="livrari.html"><i class="fa-solid fa-truck"></i> Livrări</a>
<a href="fonduri.html"><i class="fa-solid fa-money-bill-wave"></i> Fonduri</a>
<a href="telefon.html"><i class="fa-solid fa-phone"></i> Nr Tel</a>
<a href="taxa.html"><i class="fa-solid fa-money-bill"></i> Taxă</a>
</div>
</div>

<div class="main">

<div class="box">
<h2>Adaugă informații</h2>

<div class="grid">
<input id="phone" class="input" placeholder="Număr telefon">
<input id="iban" class="input" placeholder="IBAN">
<input id="cnp" class="input" placeholder="CNP">
</div>

<button class="btn" onclick="addInfo()">Trimite</button>
</div>

<h2 style="margin-top:25px;">Membri</h2>
<div class="members-grid" id="list"></div>

</div>

<div class="popup-overlay" id="popup">
<div class="popup-box">
<h2 id="title"></h2>
<div id="history"></div>
<button class="close-btn" onclick="closePopup()">Închide</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyA_QTU32QGx14PpaGIwT_N-PFnFjL8UO_E",
authDomain: "la-nueva-2f499.firebaseapp.com",
databaseURL: "https://la-nueva-2f499-default-rtdb.firebaseio.com",
projectId: "la-nueva-2f499",
storageBucket: "la-nueva-2f499.appspot.com",
messagingSenderId: "999957175996",
appId: "1:999957175996:web:84c834a90bd3ced93dbab9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user;

async function getUser(uid){
const s = await get(ref(db,"users/"+uid));
return s.exists()?s.val():null;
}

window.addInfo = async function(){

const phone = document.getElementById("phone").value.trim();
const iban = document.getElementById("iban").value.trim();
const cnp = document.getElementById("cnp").value.trim();

if(!phone || !iban || !cnp){
alert("Completează toate câmpurile!");
return;
}

await push(ref(db,"informatii"),{
uid:user.uid,
phone,
iban,
cnp,
date:new Date().toLocaleString("ro-RO")
});

load();
};

async function load(){

const snap = await get(ref(db,"informatii"));
const box = document.getElementById("list");
box.innerHTML="";

if(!snap.exists()) return;

const data = Object.values(snap.val());

const unique = [...new Map(data.map(x=>[x.uid,x])).values()];

for(const u of unique){

const profile = await getUser(u.uid);

const name = profile?.discord || "User";
const avatar = profile?.avatar || "https://cdn.discordapp.com/embed/avatars/0.png";

box.innerHTML += `
<div class="member-card">
<img class="member-avatar" src="${avatar}">
<h3>${name}</h3>
<button class="view-btn" onclick="view('${u.uid}','${name}')">Vizualizează</button>
</div>`;
}
}

window.view = async function(uid,name){

const snap = await get(ref(db,"informatii"));
const data = Object.values(snap.val()||{}).filter(x=>x.uid===uid);

document.getElementById("popup").style.display="flex";
document.getElementById("title").innerText=name;
document.getElementById("history").innerHTML="";

data.reverse().forEach(d=>{
document.getElementById("history").innerHTML += `
<div class="card">
📞 ${d.phone}<br>
🏦 ${d.iban}<br>
🪪 ${d.cnp}<br>
📅 ${d.date}
</div>`;
});
};

window.closePopup = ()=> {
document.getElementById("popup").style.display="none";
};

onAuthStateChanged(auth,(u)=>{
if(!u) location.href="index.html";
user=u;
load();
});

</script>

</body>
