<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA NUEVA</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body {
    margin:0;
    color:white;
    background:
      linear-gradient(rgba(7,7,12,.38), rgba(7,7,12,.68)),
      url("background.png") center/cover no-repeat fixed;
}

.hidden{ display:none !important; }

#loadingScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.7);
  z-index:9999;
  font-size:22px;
  font-weight:600;
}

.card{
    position:absolute;
    left:40px;
    top:120px;
    width:220px;
    padding:16px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
}

.card h2{
    font-size:16px;
    margin-bottom:6px;
    color:#ddc4ff;
}

.card p{
    font-size:12px;
    opacity:.8;
}

.card button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-weight:600;
    font-size:12px;
    background:linear-gradient(135deg,#8b5cf6,#a855f7);
}

.profile{
    position:fixed;
    top:25px;
    right:25px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.profile img{
    width:45px;
    height:45px;
    border-radius:14px;
    border:2px solid rgba(139,92,246,.25);
}

.profile-card{
    position:fixed;
    top:90px;
    right:25px;
    width:300px;
    padding:20px;
    border-radius:25px;
    background:rgba(16,16,24,.92);
    backdrop-filter:blur(20px);
}

.profile-card img{
    width:70px;
    height:70px;
    border-radius:50%;
    margin-bottom:10px;
}

.profile-card input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,.05);
    color:white;
}

.profile-card button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    color:white;
    background:linear-gradient(135deg,#8b5cf6,#a855f7);
}

.auth-popup{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:flex-start;
    align-items:flex-start;
    background:rgba(0,0,0,.6);
}

.auth-box{
    margin:40px;
    width:340px;
    padding:30px;
    border-radius:20px;
    background:rgba(16,16,24,.95);
}

.auth-box input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,.05);
    color:white;
}

.auth-box button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#8b5cf6,#a855f7);
}

#switchMode{
    margin-top:10px;
    cursor:pointer;
    font-size:13px;
    opacity:.8;
}
</style>
</head>

<body>

<div id="loadingScreen">Loading LA NUEVA
FAMILIA MADE By...</div>

<!-- DASHBOARD BUTTON -->
<div class="card">
  <h2>Dashboard</h2>
  <p>Accesează pagina</p>
  <button onclick="window.location.href='dashboard.html'">Go</button>
</div>

<div class="profile hidden" id="profileBtn">
  <img id="profileAvatar">
  <span id="profileName"></span>
</div>

<div class="profile-card hidden" id="profileCard">
  <img id="cardAvatar">
  <input id="cardDiscord" placeholder="Discord Name">
  <input id="cardEmail" disabled>
  <input id="cardUID" disabled>
  <input id="cardAvatarURL" placeholder="Avatar URL">
  <button id="saveBtn">Save</button>
  <button id="logoutBtn">Logout</button>
</div>

<div class="auth-popup hidden" id="authPopup">
  <div class="auth-box">
    <h2 id="authTitle">Register</h2>

    <input id="discordName" placeholder="Discord Name">
    <input id="userID" placeholder="User ID">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">

    <button id="authBtn">Register</button>
    <p id="switchMode">Already have account? Login</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_QTU32QGx14PpaGIwT_N-PFnFjL8UO_E",
  authDomain: "la-nueva-2f499.firebaseapp.com",
  projectId: "la-nueva-2f499",
  storageBucket: "la-nueva-2f499.appspot.com",
  messagingSenderId: "999957175996",
  appId: "1:999957175996:web:84c834a90bd3ced93dbab9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let isLogin = false;

const hideAll = () => {
  document.getElementById("authPopup").classList.add("hidden");
  document.getElementById("profileBtn").classList.add("hidden");
  document.getElementById("profileCard").classList.add("hidden");
};

const showAuth = () => {
  document.getElementById("authPopup").classList.remove("hidden");
};

const showContent = () => {
  document.getElementById("profileBtn").classList.remove("hidden");
};

async function loadProfile(uid){
  const snap = await get(ref(db,'users/'+uid));
  if(snap.exists()){
    const d = snap.val();

    document.getElementById("profileName").textContent = d.discord || "User";
    document.getElementById("profileAvatar").src = d.avatar || "";
    document.getElementById("cardAvatar").src = d.avatar || "";

    document.getElementById("cardDiscord").value = d.discord || "";
    document.getElementById("cardEmail").value = d.email || "";
    document.getElementById("cardUID").value = d.uid || "";
    document.getElementById("cardAvatarURL").value = d.avatar || "";
  }
}

document.getElementById("profileBtn").onclick = () => {
  document.getElementById("profileCard").classList.toggle("hidden");
};

document.getElementById("saveBtn").onclick = async () => {
  const user = auth.currentUser;
  if(!user) return;

  await update(ref(db,'users/'+user.uid),{
    discord: document.getElementById("cardDiscord").value,
    avatar: document.getElementById("cardAvatarURL").value
  });

  loadProfile(user.uid);
};

document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  document.getElementById("loadingScreen").style.display = "none";

  if(user){
    hideAll();
    showContent();
    loadProfile(user.uid);
  } else {
    hideAll();
    showAuth();
  }
});

document.getElementById("switchMode").onclick = () => {
  isLogin = !isLogin;

  document.getElementById("authTitle").textContent = isLogin ? "Login" : "Register";
  document.getElementById("authBtn").textContent = isLogin ? "Login" : "Register";
};

document.getElementById("authBtn").onclick = async () => {

  const emailVal = document.getElementById("email").value;
  const passVal = document.getElementById("password").value;
  const discordVal = document.getElementById("discordName").value;
  const uidVal = document.getElementById("userID").value;
  const confVal = document.getElementById("confirmPassword").value;

  try {

    if(!isLogin){

      if(passVal !== confVal){
        alert("Parolele nu coincid!");
        return;
      }

      const userCred = await createUserWithEmailAndPassword(auth, emailVal, passVal);

      await set(ref(db,'users/'+userCred.user.uid),{
        discord: discordVal,
        email: emailVal,
        uid: uidVal,
        avatar: ""
      });

      alert("Cont creat!");
    }
    else {
      await signInWithEmailAndPassword(auth, emailVal, passVal);
      alert("Login reușit!");
    }

  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
