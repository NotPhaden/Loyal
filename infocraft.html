
<head>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    linear-gradient(rgba(7,7,12,.55), rgba(7,7,12,.85)),
    url("background.png") center/cover no-repeat fixed;
    color:white;
}

.app{ display:flex; }

.sidebar{
    width:270px;
    min-height:100vh;
    padding:25px;
    background:rgba(10,10,18,.75);
    backdrop-filter:blur(20px);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{ font-size:22px; }
.logo span{ font-size:12px; opacity:.7; }
.logo p{ font-size:10px; opacity:.5; }

.sidebar nav a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    color:#a1a1aa;
    text-decoration:none;
    transition:.2s;
}

.sidebar nav a:hover{
    background:rgba(255,255,255,.05);
    color:white;
}

.sidebar nav a.active{
    background:rgba(139,92,246,.25);
    color:white;
}

.main{
    flex:1;
    padding:25px;
}

h1{
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
}

.card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:14px;
    transition:.2s;
}

.card:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.06);
}

.card h3{
    font-size:15px;
    margin-bottom:8px;
}

.item{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    padding:4px 0;
    color:#cfcfd6;
}

.badge{
    font-size:11px;
    padding:4px 8px;
    border-radius:8px;
    background:rgba(139,92,246,.25);
    display:inline-block;
    margin-top:10px;
}
</style>
</head>

<body>

        <div class="item"><span>• -</span><span>x5</span></div>

    </div>

    <div class="card">
        <h3>Pistol Craft</h3>

        <div class="item"><span>• -</span><span>x2</span></div>
        <div class="item"><span>• -</span><span>x1</span></div>

    <div class="card">

</div>
